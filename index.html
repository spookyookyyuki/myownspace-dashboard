<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHAOS MYSPACE ✨</title>

<style>
body{
  margin:0;
  font-family:"Comic Sans MS",cursive;
  overflow-x:hidden;
  background:linear-gradient(270deg,#ff00cc,#3333ff,#00ffee);
  background-size:600% 600%;
  animation:bgMove 8s infinite alternate;
  color:white;
}

@keyframes bgMove{
  0%{background-position:0%}
  100%{background-position:100%}
}

/* GLITTER OVERLAY */
#glitter{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif");
  opacity:0.2;
  pointer-events:none;
}

/* FLOATING HEARTS */
.heart{
  position:fixed;
  color:pink;
  animation:floatUp 5s linear infinite;
  font-size:20px;
}

@keyframes floatUp{
  from{transform:translateY(100vh);opacity:1;}
  to{transform:translateY(-10vh);opacity:0;}
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  font-size:28px;
  background:black;
  border-bottom:3px solid hotpink;
}

/* BOX */
.box{
  background:rgba(0,0,0,0.85);
  border:2px solid hotpink;
  border-radius:10px;
  padding:10px;
  margin:10px;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:25% 50% 25%;
}

/* MUSIC */
#music{
  position:fixed;
  bottom:20px;
  left:20px;
  background:black;
  padding:10px;
  border:2px solid hotpink;
  cursor:move;
}

/* COMMENTS */
#comments{height:120px;overflow:auto;background:black}

/* SPARKLES */
.sparkle{
  position:fixed;
  width:10px;
  height:10px;
  background:hotpink;
  border-radius:50%;
  pointer-events:none;
  animation:fade 1s forwards;
}
@keyframes fade{to{opacity:0;transform:scale(3);}}

/* FALLING TEXT */
.falling{
  position:fixed;
  top:-20px;
  animation:fall linear forwards;
  font-size:14px;
}
@keyframes fall{
  to{transform:translateY(110vh);}
}

/* SETTINGS */
#settingsBtn{
  position:fixed;
  top:10px;
  right:10px;
  z-index:999;
}
#settingsPanel{
  position:fixed;
  top:0;
  right:-260px;
  width:250px;
  height:100%;
  background:black;
  border-left:2px solid hotpink;
  padding:10px;
  transition:.3s;
}
#settingsPanel.open{right:0}
</style>
</head>

<body>

<div id="glitter"></div>

<button id="settingsBtn">⚙️</button>

<div id="settingsPanel">
<h3>Chaos Settings</h3>
<label><input type="checkbox" id="heartsToggle" checked> Floating Hearts</label><br>
<label><input type="checkbox" id="sparkleToggle" checked> Sparkles</label><br>
<label><input type="checkbox" id="fallingToggle" checked> Falling Text</label><br>
</div>

<div class="header">✨ CHAOS MYSPACE ✨</div>

<div class="container">

<div class="box">
<h3>💖 Profile</h3>
<p>mood: unhinged but productive</p>
<div id="views"></div>
</div>

<div class="box">
<h3>⏱ Time Tracker (barely surviving)</h3>
<table id="sheet">
<tr><th>Start</th><th>End</th><th>Min</th></tr>
</table>
<button onclick="addRow()">+ Add</button>
<div id="total"></div>
</div>

<div class="box">
<h3>💬 Comments</h3>
<div id="comments"></div>
<input id="commentInput">
<button onclick="postComment()">Post</button>
</div>

</div>

<div id="music">
🎵<br>
<audio id="audio" controls loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>
</div>

<script>
const $=id=>document.getElementById(id);

/* SETTINGS */
$("settingsBtn").onclick=()=>$("settingsPanel").classList.toggle("open");

/* VIEWS */
let v=localStorage.v||0; v++; localStorage.v=v;
$("views").textContent="👀 Views: "+v;

/* HEARTS */
setInterval(()=>{
  if(!$("heartsToggle").checked) return;
  const h=document.createElement("div");
  h.className="heart";
  h.innerText="💖";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},500);

/* SPARKLES */
document.addEventListener("mousemove",e=>{
  if(!$("sparkleToggle").checked) return;
  const s=document.createElement("div");
  s.className="sparkle";
  s.style.left=e.pageX+"px";
  s.style.top=e.pageY+"px";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),1000);
});

/* FALLING TEXT */
const phrases=["so random","rawr xD","ily","main character","crying lol"];
setInterval(()=>{
  if(!$("fallingToggle").checked) return;
  const f=document.createElement("div");
  f.className="falling";
  f.innerText=phrases[Math.floor(Math.random()*phrases.length)];
  f.style.left=Math.random()*100+"vw";
  f.style.animationDuration=(3+Math.random()*4)+"s";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),7000);
},800);

/* TIME TRACKER */
function addRow(){
  const r=$("sheet").insertRow();
  const s=document.createElement("input");
  const e=document.createElement("input");
  const m=document.createElement("input");
  s.type="time"; e.type="time"; m.readOnly=true;

  r.insertCell(0).appendChild(s);
  r.insertCell(1).appendChild(e);
  r.insertCell(2).appendChild(m);

  function calc(){
    if(!s.value||!e.value) return;
    const [sh,sm]=s.value.split(":").map(Number);
    const [eh,em]=e.value.split(":").map(Number);
    m.value=Math.max(0,(eh*60+em)-(sh*60+sm));
    updateTotal();
  }

  s.onchange=e.onchange=calc;
}

function updateTotal(){
  let t=0;
  [...$("sheet").rows].slice(1).forEach(r=>{
    const v=r.cells[2].firstChild.value;
    if(v) t+=+v;
  });
  $("total").textContent="Total: "+t+" min";
}

/* COMMENTS */
function postComment(){
  const c=$("commentInput");
  if(!c.value.trim()) return;
  const d=document.createElement("div");
  d.textContent=c.value;
  $("comments").appendChild(d);
  c.value="";
}

/* DRAG MUSIC */
let down=false,off=[0,0];
$("music").onmousedown=e=>{
  down=true;
  off=[e.clientX-$("music").offsetLeft,e.clientY-$("music").offsetTop];
};
document.onmouseup=()=>down=false;
document.onmousemove=e=>{
  if(down){
    $("music").style.left=(e.clientX-off[0])+"px";
    $("music").style.top=(e.clientY-off[1])+"px";
  }
};
</script>

</body>
</html>
