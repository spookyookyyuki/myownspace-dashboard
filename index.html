<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MySpace Productivity</title>

<style>
/* BASE */
body{
  margin:0;
  font-family:"Comic Sans MS",cursive;
  background:#111;
  color:#ff66cc;
  -webkit-text-size-adjust:100%;
}

/* ORIGINAL THEMES */
body.scene{background:#111;color:#ff00aa}
body.kawaii{background:#ffe6f5;color:#ff1493}
body.pastel{background:#e6f7ff;color:#9966ff}
body.gothic{background:#0b0b0b;color:#ff66cc}

/* NEW THEMES */

/* ✨ GLITTER */
body.glitter{
  background:black;
  color:#ffccff;
  background-image:url("https://i.imgur.com/8QfQZ6T.gif");
}

/* 🖤 EMO */
body.emo{
  background:#000;
  color:#ff0000;
  font-family:"Courier New",monospace;
}

/* ⚡ NEON */
body.neon{
  background:#000;
  color:#39ff14;
  text-shadow:0 0 6px #39ff14,0 0 12px #39ff14;
}

/* 💿 Y2K */
body.y2k{
  background:linear-gradient(135deg,#ff00cc,#3333ff);
  color:white;
  font-family:Verdana,sans-serif;
}

/* BG */
#bg-layer{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  pointer-events:none;
  z-index:0;
}

/* HEADER */
.header{
  background:#ff0099;
  padding:12px;
  text-align:center;
  font-size:20px;
  color:white;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:260px 1fr 260px;
  gap:20px;
  padding:20px;
}

@media(max-width:900px){
  .container{
    grid-template-columns:1fr;
    padding:10px;
    gap:10px;
  }
}

/* BOX */
.box{
  background:#1a1a1a;
  border:3px solid hotpink;
  padding:15px;
  border-radius:10px;
}

/* THEME EFFECTS */
body.neon .box{
  box-shadow:0 0 12px #39ff14;
  border-color:#39ff14;
}

body.emo .box{
  border-color:red;
}

body.glitter .box{
  background:rgba(0,0,0,0.7);
}

body.y2k .box{
  backdrop-filter:blur(6px);
  background:rgba(255,255,255,0.1);
}

/* AVATAR */
#banner{
  height:120px;
  background:#222;
  background-size:cover;
  border:2px solid hotpink;
  margin-bottom:10px;
}

#avatar{
  width:80px;
  border-radius:50%;
  border:3px solid hotpink;
  display:block;
  margin:auto;
}

/* TABLE */
.table-container{overflow-x:auto}
table{min-width:320px;border-collapse:collapse}
th,td{border:1px solid hotpink;padding:8px;text-align:center}

/* INPUTS */
input,select,textarea,button{
  font-size:18px;
  border-radius:6px;
}

input,select,textarea{
  background:black;
  color:#ff66cc;
  border:1px solid hotpink;
  padding:8px;
  width:100%;
}

/* BUTTON THEMES */
button{
  background:#ff0099;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  margin-top:6px;
}

body.glitter button{
  background:linear-gradient(45deg,#ff66cc,#fff,#ff66cc);
  color:black;
}

body.neon button{
  background:black;
  color:#39ff14;
  border:1px solid #39ff14;
}

body.emo button{
  background:black;
  color:red;
  border:1px solid red;
}

body.y2k button{
  background:linear-gradient(90deg,#00ffff,#ff00ff);
}

/* GRAPH */
#graph{height:20px;background:#333;border:2px solid hotpink;margin-top:6px}
#bar{height:100%;width:0%;background:linear-gradient(90deg,hotpink,#ff66cc)}

/* COMMENTS */
#comments{height:120px;overflow:auto;background:black;padding:6px}

/* FLOAT */
.decor{
  position:absolute;
  font-size:24px;
  animation:float 12s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh)}
  100%{transform:translateY(-10vh)}
}

/* POPUP */
#goalPopup{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#ff0099;
  color:white;
  padding:20px;
  display:none;
}

textarea{min-height:80px}

</style>
</head>

<body class="scene">

<div id="bg-layer"></div>

<div class="header">MySpace Productivity Dashboard ✨</div>

<div class="container">

<div class="box">
<div id="banner"></div>
<img id="avatar">

<h4>Avatar</h4>
<input type="file" id="avatarUpload">

<h4>Banner</h4>
<input type="file" id="bannerUpload">

<h4>Theme</h4>
<select id="themeSelect">
<option value="scene">Scene</option>
<option value="kawaii">Kawaii</option>
<option value="pastel">Pastel</option>
<option value="gothic">Gothic</option>
<option value="glitter">✨ Glitter</option>
<option value="emo">🖤 Emo</option>
<option value="neon">⚡ Neon</option>
<option value="y2k">💿 Y2K</option>
</select>
</div>

<div class="box">
<h3>Production Time</h3>
<div class="table-container">
<table id="sheet">
<tr><th>Start</th><th>End</th><th>Minutes</th></tr>
</table>
</div>
<div id="total">Total: 0</div>
<div id="timeDisplay">0 minutes</div>
<div id="graph"><div id="bar"></div></div>
</div>

<div>
<div class="box">
<h3>Notes</h3>
<textarea id="notes"></textarea>
</div>

<br>

<div class="box">
<h3>Comment Wall</h3>
<div id="comments"></div>
<input id="commentInput">
<button onclick="postComment()">Post</button>
</div>
</div>

</div>

<div id="goalPopup">✨ Goal Reached! ✨</div>

<script>
const sheet=document.getElementById("sheet")

avatarUpload.onchange=e=>{
let r=new FileReader()
r.onload=()=>{avatar.src=r.result;localStorage.avatar=r.result}
r.readAsDataURL(e.target.files[0])
}

bannerUpload.onchange=e=>{
let r=new FileReader()
r.onload=()=>{banner.style.backgroundImage="url("+r.result+")";localStorage.banner=r.result}
r.readAsDataURL(e.target.files[0])
}

if(localStorage.avatar) avatar.src=localStorage.avatar
if(localStorage.banner) banner.style.backgroundImage="url("+localStorage.banner+")"

themeSelect.onchange=()=>{
document.body.className=themeSelect.value
localStorage.theme=themeSelect.value
}

if(localStorage.theme){
document.body.className=localStorage.theme
themeSelect.value=localStorage.theme
}

notes.value=localStorage.notes||""
notes.oninput=()=>localStorage.notes=notes.value

function addRow(){
let row=sheet.insertRow()
let sh=document.createElement("input"),sm=document.createElement("input"),sap=document.createElement("select"),eh=document.createElement("input"),em=document.createElement("input"),eap=document.createElement("select"),mins=document.createElement("input")

sh.type=eh.type="number";sh.min=1;sh.max=12
sm.type=em.type="number";sm.min=0;sm.max=59
mins.type="number"

sap.innerHTML="<option>AM</option><option>PM</option>"
eap.innerHTML="<option>AM</option><option>PM</option>"

row.insertCell(0).append(sh,":",sm,sap)
row.insertCell(1).append(eh,":",em,eap)
row.insertCell(2).append(mins)

function calc(){
if(!sh.value||!eh.value)return
let sH=Number(sh.value),sM=Number(sm.value||0),eH=Number(eh.value),eM=Number(em.value||0)
if(sap.value==="PM"&&sH!==12)sH+=12
if(sap.value==="AM"&&sH===12)sH=0
if(eap.value==="PM"&&eH!==12)eH+=12
if(eap.value==="AM"&&eH===12)eH=0
let diff=(eH*60+eM)-(sH*60+sM)
if(diff>=0)mins.value=diff
updateTotal()
}

sh.onchange=sm.onchange=sap.onchange=eh.onchange=em.onchange=eap.onchange=calc
mins.oninput=updateTotal
}

for(let i=0;i<20;i++)addRow()

function updateTotal(){
let total=0
document.querySelectorAll("#sheet tr").forEach((r,i)=>{
if(i===0)return
let v=r.cells[2].firstChild.value
if(v)total+=Number(v)
})
let h=Math.floor(total/60),m=total%60
total?timeDisplay.innerText=`${total} minutes (${h}h ${m}m)`:""
bar.style.width=Math.min((total/480)*100,100)+"%"
if(total>=480){
goalPopup.style.display="block"
setTimeout(()=>goalPopup.style.display="none",3000)
}
}

function postComment(){
let d=document.createElement("div")
d.innerText=commentInput.value
comments.appendChild(d)
commentInput.value=""
}

let icons=["🎀","🐱","💖","⭐","🖤"]
for(let i=0;i<15;i++){
let d=document.createElement("div")
d.className="decor"
d.innerText=icons[Math.floor(Math.random()*icons.length)]
d.style.left=Math.random()*100+"vw"
bg-layer.appendChild(d)
}
</script>

</body>
</html>
