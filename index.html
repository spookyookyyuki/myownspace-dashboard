<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHAOS APP 💿 ✨</title>

<style>
:root{
  --accent:#ff66cc;
  --bg1:#ff9cfb;
  --bg2:#a5b4ff;
  --bg3:#cafff0;
}

body{
  margin:0;
  font-family:"Comic Sans MS", "Segoe UI", cursive;
  color:white;
  background:linear-gradient(270deg,var(--bg1),var(--bg2),var(--bg3));
  background-size:600% 600%;
  animation:bgMove 12s infinite alternate;
  overflow:hidden;
}

@keyframes bgMove{
  0%{background-position:0%}
  100%{background-position:100%}
}

/* ✨ FLOATING SPARKLES */
.spark{
  position:fixed;
  font-size:14px;
  opacity:.6;
  animation:float 10s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}

/* 🦋 FLOATING EMOJIS */
.floaty{
  position:fixed;
  font-size:18px;
  animation:drift 12s linear infinite;
}

@keyframes drift{
  0%{transform:translateY(100vh) translateX(0);}
  100%{transform:translateY(-10vh) translateX(40px);}
}

/* PAGES */
.page{
  position:absolute;
  width:100%;
  height:100%;
  left:100%;
  transition:.3s;
  overflow:auto;
  padding-bottom:100px;
}
.page.active{left:0;}
.page.left{left:-100%;}

/* GLASS BOX */
.box{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  margin:12px;
  padding:14px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* NAV */
#nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  display:flex;
  justify-content:space-around;
  align-items:center;
}

button{
  background:none;
  border:none;
  color:white;
  font-size:20px;
  cursor:pointer;
}

.activeBtn{
  color:var(--accent);
  transform:scale(1.2);
}

/* TABLE */
#sheet{width:100%;}
#sheet td,#sheet th{text-align:center;padding:6px;}

.deleteBtn{
  background:#ff4d6d;
  border:none;
  color:white;
  border-radius:8px;
}

/* CONFETTI */
.sparkle{
  position:absolute;
  font-size:18px;
  animation:spinFall 2s linear forwards;
}

@keyframes spinFall{
  0%{transform:translateY(-20px) rotate(0deg);}
  100%{transform:translateY(100vh) rotate(360deg);opacity:0;}
}

/* SETTINGS */
#settingsPanel{
  position:fixed;
  bottom:-100%;
  width:100%;
  height:60%;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(20px);
  transition:.4s;
  padding:20px;
}
#settingsPanel.open{bottom:0;}
</style>
</head>

<body>

<div id="app">

<!-- PROFILE -->
<div class="page active">
<div class="box">
<h3>💖 Profile</h3>
<input id="name" placeholder="Name">
<textarea id="bio"></textarea>
<button onclick="saveProfile()">Save</button>
<div id="profileView"></div>
</div>
</div>

<!-- TIME -->
<div class="page">
<div class="box">
<h3>⏱ Whimsy Productivity</h3>

<table id="sheet"></table>

<button onclick="addRow()">+ Add Session ✨</button>
<div id="total"></div>
<div id="daily"></div>

</div>
</div>

</div>

<!-- NAV -->
<div id="nav">
<button onclick="goPage(0)">🏠</button>
<button onclick="goPage(1)">⏱</button>
<button onclick="toggleSettings()">⚙️</button>
</div>

<!-- SETTINGS -->
<div id="settingsPanel">
<h3>Settings 🎀</h3>
</div>

<div id="confetti"></div>

<script>
const $=id=>document.getElementById(id);

/* NAV */
const pages=[...document.querySelectorAll(".page")];
let current=0;
function goPage(i){
  pages.forEach((p,index)=>{
    p.classList.remove("active","left");
    if(index===i)p.classList.add("active");
    else if(index<i)p.classList.add("left");
  });
  current=i;
}

/* SETTINGS */
function toggleSettings(){
  $("settingsPanel").classList.toggle("open");
}

/* FLOATING EFFECTS */
function spawnFloaters(){
  const symbols=["✧","✦","₊˚⊹"];
  for(let i=0;i<20;i++){
    let s=document.createElement("div");
    s.className="spark";
    s.textContent=symbols[Math.floor(Math.random()*symbols.length)];
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(6+Math.random()*6)+"s";
    document.body.appendChild(s);
  }

  const emojis=["🦋","💖","🎀"];
  for(let i=0;i<10;i++){
    let e=document.createElement("div");
    e.className="floaty";
    e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left=Math.random()*100+"vw";
    e.style.animationDuration=(8+Math.random()*6)+"s";
    document.body.appendChild(e);
  }
}
spawnFloaters();

/* TIME */
let timeData = JSON.parse(localStorage.timeData || "[]");

function addRow(data={start:"",end:""}){
  timeData.push(data);
  saveTime();
  renderTime();
}

function saveTime(){
  localStorage.timeData = JSON.stringify(timeData);
}

function calcMinutes(s,e){
  if(!s||!e)return 0;
  let [sh,sm]=s.split(":").map(Number);
  let [eh,em]=e.split(":").map(Number);
  let start=sh*60+sm,end=eh*60+em;
  if(end<start)end+=1440;
  return end-start;
}

function format(m){
  return Math.floor(m/60)+"h "+(m%60)+"m";
}

function renderTime(){
  const table=$("sheet");
  table.innerHTML="<tr><th>Start</th><th>End</th><th>Duration</th></tr>";

  timeData.forEach((row,i)=>{
    let tr=document.createElement("tr");

    let s=document.createElement("input");
    s.type="time";
    s.value=row.start;

    let e=document.createElement("input");
    e.type="time";
    e.value=row.end;

    let d=document.createElement("span");

    function update(){
      timeData[i].start=s.value;
      timeData[i].end=e.value;

      let mins=calcMinutes(s.value,e.value);
      d.textContent=mins?format(mins):"-";

      /* rollover */
      let lastEnd=null;
      for(let j=timeData.length-1;j>=0;j--){
        if(timeData[j].end){lastEnd=timeData[j].end;break;}
      }
      if(lastEnd){
        timeData.push({start:lastEnd,end:""});
      }

      totalCalc();
      saveTime();
      renderTime();
    }

    s.onchange=e.onchange=update;

    d.textContent=calcMinutes(row.start,row.end)?format(calcMinutes(row.start,row.end)):"-";

    tr.insertCell().appendChild(s);
    tr.insertCell().appendChild(e);
    tr.insertCell().appendChild(d);

    table.appendChild(tr);
  });

  totalCalc();
}

function totalCalc(){
  let total=0;
  timeData.forEach(r=>total+=calcMinutes(r.start,r.end));
  $("total").textContent="Total ✨ "+format(total);

  let hrs=(total/60).toFixed(1);
  $("daily").textContent="You worked "+hrs+" hrs today 💖";

  if(total>=360) confetti();
}

function confetti(){
  const wrap=$("confetti");
  wrap.innerHTML="";
  const symbols=["‧₊˚♪","𝄞","₊˚⊹","✧"];
  for(let i=0;i<40;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.textContent=symbols[Math.floor(Math.random()*symbols.length)];
    s.style.left=Math.random()*100+"vw";
    wrap.appendChild(s);
  }
  setTimeout(()=>wrap.innerHTML="",2000);
}

renderTime();
</script>

</body>
</html>
