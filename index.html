<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHAOS APP 💿</title>

<style>
:root{
  --accent:hotpink;
  --bg1:#ff00cc;
  --bg2:#3333ff;
  --bg3:#00ffee;
}

body{
  margin:0;
  font-family:sans-serif;
  color:white;
  background:black;
  background:linear-gradient(270deg,var(--bg1),var(--bg2),var(--bg3));
  background-size:600% 600%;
  animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
  0%{background-position:0%}
  100%{background-position:100%}
}

.page{
  position:absolute;
  width:100%;
  height:100%;
  left:100%;
  transition:.3s;
  overflow:auto;
  padding-bottom:80px;
}
.page.active{left:0;}
.page.left{left:-100%;}

.box{
  background:rgba(0,0,0,0.7);
  margin:12px;
  padding:12px;
  border-radius:16px;
}

#nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:space-around;
  align-items:center;
}

button{
  background:none;
  border:none;
  color:white;
  font-size:18px;
}

.activeBtn{color:hotpink}

/* TABLE */
#sheet{width:100%;}
#sheet td,#sheet th{text-align:center;padding:6px;}

.deleteBtn{
  background:red;
  border:none;
  color:white;
  border-radius:6px;
}

/* SETTINGS */
#settingsPanel{
  position:fixed;
  bottom:-100%;
  width:100%;
  height:70%;
  background:black;
  transition:.4s;
  padding:20px;
}
#settingsPanel.open{bottom:0;}
</style>
</head>

<body>

<div id="app">

<!-- PROFILE -->
<div class="page active">
<div class="box">
<h3>💖 Profile</h3>
<input id="name" placeholder="Name">
<textarea id="bio"></textarea>
<button onclick="saveProfile()">Save</button>
<div id="profileView"></div>
</div>
</div>

<!-- TIME -->
<div class="page">
<div class="box">
<h3>⏱ Productivity Tracker</h3>

<table id="sheet">
<tr>
<th>Start</th>
<th>End</th>
<th>Duration</th>
<th></th>
</tr>
</table>

<button onclick="addRow()">+ Add Session</button>
<div id="total"></div>

</div>
</div>

<!-- SOCIAL -->
<div class="page">
<div class="box">
<h3>💬 Comments</h3>
<div id="comments"></div>
<input id="commentInput">
<button onclick="postComment()">Post</button>
</div>
</div>

</div>

<!-- NAV -->
<div id="nav">
<button onclick="goPage(0)">🏠</button>
<button onclick="goPage(1)">⏱</button>
<button onclick="goPage(2)">💬</button>
<button onclick="toggleSettings()">⚙️</button>
</div>

<!-- SETTINGS -->
<div id="settingsPanel">
<h3>Settings</h3>

<label>Theme</label>
<select id="theme">
<option value="">Default</option>
<option value="emo">Emo</option>
<option value="scene">Scene</option>
</select>

</div>

<script>
const $=id=>document.getElementById(id);

/* NAV */
const pages=[...document.querySelectorAll(".page")];
const navBtns=[...document.querySelectorAll("#nav button")];
let current=0;

function goPage(i){
  pages.forEach((p,index)=>{
    p.classList.remove("active","left");
    if(index===i)p.classList.add("active");
    else if(index<i)p.classList.add("left");
  });

  navBtns.forEach((b,idx)=>{
    if(idx<3)b.classList.toggle("activeBtn",idx===i);
  });

  current=i;
}

/* SETTINGS */
function toggleSettings(){
  $("settingsPanel").classList.toggle("open");
}

/* PROFILE */
function saveProfile(){
  localStorage.profile=JSON.stringify({
    name:$("name").value,
    bio:$("bio").value
  });
  loadProfile();
}
function loadProfile(){
  const p=JSON.parse(localStorage.profile||"{}");
  $("profileView").innerHTML=`<h4>${p.name||""}</h4><p>${p.bio||""}</p>`;
}
loadProfile();

/* COMMENTS */
function postComment(){
  let v=$("commentInput").value;
  if(!v)return;
  let s=JSON.parse(localStorage.comments||"[]");
  s.push(v);
  localStorage.comments=JSON.stringify(s);
  $("commentInput").value="";
  loadComments();
}
function loadComments(){
  $("comments").innerHTML="";
  JSON.parse(localStorage.comments||"[]").forEach(t=>{
    let d=document.createElement("div");
    d.textContent=t;
    $("comments").appendChild(d);
  });
}
loadComments();

/* TIME TRACKER WITH AUTO ROLLOVER */
let timeData = JSON.parse(localStorage.timeData || "[]");

function addRow(data={start:"",end:""}){
  timeData.push(data);
  saveTime();
  renderTime();
}

function deleteRow(i){
  timeData.splice(i,1);
  saveTime();
  renderTime();
}

function saveTime(){
  localStorage.timeData = JSON.stringify(timeData);
}

function calcMinutes(start,end){
  if(!start||!end)return 0;
  let [sh,sm]=start.split(":").map(Number);
  let [eh,em]=end.split(":").map(Number);
  let s=sh*60+sm;
  let e=eh*60+em;
  if(e<s)e+=1440;
  return e-s;
}

function format(min){
  let h=Math.floor(min/60);
  let m=min%60;
  return h+"h "+m+"m";
}

function renderTime(){
  const table=$("sheet");
  table.innerHTML=`<tr><th>Start</th><th>End</th><th>Duration</th><th></th></tr>`;

  timeData.forEach((row,i)=>{
    const tr=document.createElement("tr");

    const start=document.createElement("input");
    start.type="time";
    start.value=row.start;

    const end=document.createElement("input");
    end.type="time";
    end.value=row.end;

    const dur=document.createElement("span");

    function update(){
      timeData[i].start=start.value;
      timeData[i].end=end.value;

      const mins=calcMinutes(start.value,end.value);
      dur.textContent=mins?format(mins):"-";

      /* 🔥 AUTO ROLLOVER */
      if(end.value){
        if(!timeData[i+1]){
          timeData.push({start:end.value,end:""});
        } else if(!timeData[i+1].start){
          timeData[i+1].start=end.value;
        }
      }

      totalCalc();
      saveTime();
      renderTime();
    }

    start.onchange=end.onchange=update;

    dur.textContent=calcMinutes(row.start,row.end)?format(calcMinutes(row.start,row.end)):"-";

    const del=document.createElement("button");
    del.textContent="✖";
    del.className="deleteBtn";
    del.onclick=()=>deleteRow(i);

    tr.insertCell().appendChild(start);
    tr.insertCell().appendChild(end);
    tr.insertCell().appendChild(dur);
    tr.insertCell().appendChild(del);

    table.appendChild(tr);
  });

  totalCalc();
}

function totalCalc(){
  let total=0;
  timeData.forEach(r=>total+=calcMinutes(r.start,r.end));
  $("total").textContent="Total: "+format(total);
}

renderTime();
</script>

</body>
</html>
