<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>CHAOS APP 💿</title>

<style>
:root{
  --accent:hotpink;
  --bg1:#ff00cc;
  --bg2:#3333ff;
  --bg3:#00ffee;
  --box:rgba(0,0,0,0.75);
  --text:white;
}

body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  color:white;
  background-color:black;
  background:linear-gradient(270deg,var(--bg1),var(--bg2),var(--bg3));
  background-size:600% 600%;
  animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
  0%{background-position:0%}
  100%{background-position:100%}
}

#app{height:100vh;overflow:hidden;position:relative;}

.page{
  position:absolute;
  width:100%;
  height:100%;
  left:100%;
  transition:.3s;
  overflow-y:auto;
  padding-bottom:90px;
}
.page.active{left:0;}
.page.left{left:-100%;}

.box{
  background:var(--box);
  margin:12px;
  padding:12px;
  border-radius:16px;
}

/* NAV */
#nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:space-around;
  align-items:center;
}

#nav button{
  background:none;
  border:none;
  color:white;
  font-size:20px;
}

#nav button.active{
  color:var(--accent);
  transform:scale(1.2);
}

/* SETTINGS */
#settingsPanel{
  position:fixed;
  bottom:-100%;
  width:100%;
  height:70%;
  background:black;
  padding:20px;
  transition:.4s;
}
#settingsPanel.open{bottom:0;}

#closeSettings{
  position:absolute;
  right:15px;
  top:10px;
  background:none;
  color:white;
  border:none;
  font-size:20px;
}

/* TIME TABLE */
#sheet{width:100%;}
#sheet td, #sheet th{text-align:center;padding:6px;}

.deleteBtn{
  background:red;
  color:white;
  border:none;
  border-radius:6px;
}

/* COLLAGE */
#collage{position:relative;height:200px;}
#collage img{
  position:absolute;
  width:80px;
}

/* PROFILE */
#pfp{
  width:100px;
  height:100px;
  border-radius:12px;
}

input,textarea,select,button{
  width:100%;
  margin-top:6px;
}
</style>
</head>

<body>

<div id="app">

<!-- PROFILE -->
<div class="page active">
<div class="box">
<h3>💖 Profile</h3>
<img id="pfp">
<input id="name" placeholder="Name">
<textarea id="bio"></textarea>
<button onclick="saveProfile()">Save</button>
<div id="profileView"></div>
</div>
</div>

<!-- TIME TRACKER -->
<div class="page">
<div class="box">
<h3>⏱ Time Tracker</h3>

<table id="sheet">
<tr>
<th>Start</th>
<th>End</th>
<th>Duration</th>
<th></th>
</tr>
</table>

<button onclick="addRow()">+ Add Session</button>
<div id="total"></div>

</div>
</div>

<!-- SOCIAL -->
<div class="page">
<div class="box">
<h3>💬 Comments</h3>
<div id="comments"></div>
<input id="commentInput">
<button onclick="postComment()">Post</button>
</div>

<div class="box">
<h3>📖 Guestbook</h3>
<div id="guestbook"></div>
<input id="guestInput">
<button onclick="addGuest()">Sign</button>
</div>
</div>

<!-- COLLAGE -->
<div class="page">
<div class="box">
<h3>📸 Collage</h3>
<input type="file" id="collageUpload" multiple>
<div id="collage"></div>
</div>
</div>

</div>

<!-- NAV -->
<div id="nav">
<button onclick="goPage(0)">🏠</button>
<button onclick="goPage(1)">⏱</button>
<button onclick="goPage(2)">💬</button>
<button onclick="goPage(3)">📸</button>
<button onclick="toggleSettings()">⚙️</button>
</div>

<!-- SETTINGS -->
<div id="settingsPanel">
<button id="closeSettings">✖</button>

<h3>Settings</h3>

<label>Theme</label>
<select id="theme">
<option value="">Default</option>
<option value="emo">Emo</option>
<option value="scene">Scene</option>
<option value="glitch">Glitch</option>
<option value="glitter">Glitter</option>
</select>

<label>Background</label>
<input type="checkbox" id="bgToggle">
<input type="file" id="bgUpload">

<label>Profile Pic</label>
<input type="file" id="pfpUpload">

</div>

<script>
const $=id=>document.getElementById(id);

/* NAV */
const pages=[...document.querySelectorAll(".page")];
const navBtns=[...document.querySelectorAll("#nav button")];
let current=0;

function goPage(i){
  pages.forEach((p,index)=>{
    p.classList.remove("active","left");
    if(index===i)p.classList.add("active");
    else if(index<i)p.classList.add("left");
  });

  navBtns.forEach((b,idx)=>{
    if(idx!==4)b.classList.toggle("active",idx===i);
  });

  current=i;
}

/* SETTINGS */
function toggleSettings(){
  $("settingsPanel").classList.toggle("open");
}
$("closeSettings").onclick=()=>$("settingsPanel").classList.remove("open");

/* BASE64 */
function toBase64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}

/* BACKGROUND FIX */
function applyBackground(){
  if(localStorage.bg && localStorage.bgToggle==="true"){
    document.body.style.background=`url(${localStorage.bg}) center/cover no-repeat`;
  }else{
    document.body.style.background="";
  }
}

$("bgUpload").onchange=async e=>{
  const d=await toBase64(e.target.files[0]);
  localStorage.bg=d;
  applyBackground();
};

$("bgToggle").onchange=e=>{
  localStorage.bgToggle=e.target.checked;
  applyBackground();
};

if(localStorage.bgToggle==="true"){
  $("bgToggle").checked=true;
}
applyBackground();

/* PROFILE PIC */
$("pfpUpload").onchange=async e=>{
  const d=await toBase64(e.target.files[0]);
  localStorage.pfp=d;
  $("pfp").src=d;
};
if(localStorage.pfp) $("pfp").src=localStorage.pfp;

/* PROFILE */
function saveProfile(){
  localStorage.profile=JSON.stringify({
    name:$("name").value,
    bio:$("bio").value
  });
  loadProfile();
}
function loadProfile(){
  const p=JSON.parse(localStorage.profile||"{}");
  $("profileView").innerHTML=`<h4>${p.name||""}</h4><p>${p.bio||""}</p>`;
}
loadProfile();

/* COMMENTS */
function postComment(){
  let v=$("commentInput").value;
  if(!v)return;
  let s=JSON.parse(localStorage.comments||"[]");
  s.push(v);
  localStorage.comments=JSON.stringify(s);
  $("commentInput").value="";
  loadComments();
}
function loadComments(){
  $("comments").innerHTML="";
  JSON.parse(localStorage.comments||"[]").forEach(t=>{
    let d=document.createElement("div");
    d.textContent=t;
    $("comments").appendChild(d);
  });
}
loadComments();

/* GUESTBOOK */
function addGuest(){
  let v=$("guestInput").value;
  if(!v)return;
  let s=JSON.parse(localStorage.guestbook||"[]");
  s.push({text:v,time:new Date().toLocaleString()});
  localStorage.guestbook=JSON.stringify(s);
  $("guestInput").value="";
  loadGuest();
}
function loadGuest(){
  $("guestbook").innerHTML="";
  JSON.parse(localStorage.guestbook||"[]").forEach(e=>{
    let d=document.createElement("div");
    d.innerHTML=`<b>${e.time}</b><br>${e.text}`;
    $("guestbook").appendChild(d);
  });
}
loadGuest();

/* COLLAGE */
$("collageUpload").onchange=async e=>{
  let s=JSON.parse(localStorage.collage||"[]");
  for(const f of e.target.files){
    s.push(await toBase64(f));
  }
  localStorage.collage=JSON.stringify(s);
  loadCollage();
};

function loadCollage(){
  const wrap=$("collage");
  wrap.innerHTML="";
  const s=JSON.parse(localStorage.collage||"[]");

  s.forEach((src,i)=>{
    const img=document.createElement("img");
    img.src=src;

    img.style.left=Math.random()*200+"px";
    img.style.top=Math.random()*200+"px";

    img.ondblclick=()=>{
      s.splice(i,1);
      localStorage.collage=JSON.stringify(s);
      loadCollage();
    };

    wrap.appendChild(img);
  });
}
loadCollage();

/* TIME TRACKER FULL */
let timeData = JSON.parse(localStorage.timeData || "[]");

function addRow(data={start:"",end:""}){
  timeData.push(data);
  saveTime();
  renderTime();
}

function deleteRow(i){
  timeData.splice(i,1);
  saveTime();
  renderTime();
}

function saveTime(){
  localStorage.timeData = JSON.stringify(timeData);
}

function calcMinutes(start,end){
  if(!start||!end)return 0;

  let [sh,sm]=start.split(":").map(Number);
  let [eh,em]=end.split(":").map(Number);

  let s=sh*60+sm;
  let e=eh*60+em;

  if(e<s)e+=1440;
  return e-s;
}

function format(min){
  let h=Math.floor(min/60);
  let m=min%60;
  return h+"h "+m+"m";
}

function renderTime(){
  const table=$("sheet");
  table.innerHTML=`<tr><th>Start</th><th>End</th><th>Duration</th><th></th></tr>`;

  timeData.forEach((row,i)=>{
    const tr=document.createElement("tr");

    const start=document.createElement("input");
    start.type="time";
    start.value=row.start;

    const end=document.createElement("input");
    end.type="time";
    end.value=row.end;

    const dur=document.createElement("span");

    function update(){
      timeData[i].start=start.value;
      timeData[i].end=end.value;
      const mins=calcMinutes(start.value,end.value);
      dur.textContent=mins?format(mins):"-";
      totalCalc();
      saveTime();
    }

    start.onchange=end.onchange=update;

    dur.textContent=calcMinutes(row.start,row.end)?format(calcMinutes(row.start,row.end)):"-";

    const del=document.createElement("button");
    del.textContent="✖";
    del.className="deleteBtn";
    del.onclick=()=>deleteRow(i);

    tr.insertCell().appendChild(start);
    tr.insertCell().appendChild(end);
    tr.insertCell().appendChild(dur);
    tr.insertCell().appendChild(del);

    table.appendChild(tr);
  });

  totalCalc();
}

function totalCalc(){
  let total=0;
  timeData.forEach(r=>total+=calcMinutes(r.start,r.end));
  $("total").textContent="Total: "+format(total)+" ("+total+" min)";
}

renderTime();
</script>

</body>
</html>
