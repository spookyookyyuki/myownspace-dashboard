<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHAOS APP 💿✨</title>

<style>
:root{
  --accent:#ff66cc;
}

body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  color:white;
  background:linear-gradient(270deg,#ff9cfb,#a5b4ff,#cafff0);
  background-size:600% 600%;
  animation:bg 12s infinite alternate;
}

@keyframes bg{
  0%{background-position:0%}
  100%{background-position:100%}
}

.page{
  position:absolute;
  width:100%;
  height:100%;
  left:100%;
  transition:.3s;
  overflow:auto;
  padding-bottom:90px;
}
.page.active{left:0;}

.box{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  margin:12px;
  padding:12px;
  border-radius:20px;
}

/* NAV */
#nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:space-around;
  align-items:center;
}

button{
  background:none;
  border:none;
  color:white;
  font-size:18px;
}

/* TABLE */
#sheet{width:100%;}
#sheet td,#sheet th{text-align:center;padding:6px;}

.deleteBtn{
  background:#ff4d6d;
  border:none;
  color:white;
  border-radius:6px;
}

/* CONFETTI */
.sparkle{
  position:fixed;
  top:0;
  font-size:18px;
  animation:fall 2s linear forwards;
}
@keyframes fall{
  to{transform:translateY(100vh);opacity:0;}
}
</style>
</head>

<body>

<div id="app">

<!-- PROFILE -->
<div class="page active">
<div class="box">
<h3>💖 Profile</h3>
<input id="name" placeholder="Name">
<textarea id="bio"></textarea>
<button onclick="saveProfile()">Save</button>
<div id="profileView"></div>
</div>
</div>

<!-- TIME -->
<div class="page">
<div class="box">
<h3>⏱ Productivity Tracker ✨</h3>

<table id="sheet"></table>

<button onclick="addRow()">+ Add Session</button>
<div id="total"></div>
<div id="daily"></div>

</div>
</div>

</div>

<!-- NAV -->
<div id="nav">
<button onclick="goPage(0)">🏠</button>
<button onclick="goPage(1)">⏱</button>
</div>

<div id="confetti"></div>

<script>
const $=id=>document.getElementById(id);

/* NAV */
const pages=[...document.querySelectorAll(".page")];
function goPage(i){
  pages.forEach((p,index)=>{
    p.classList.remove("active");
    if(index===i)p.classList.add("active");
  });
}

/* PROFILE */
function saveProfile(){
  localStorage.profile=JSON.stringify({
    name:$("name").value,
    bio:$("bio").value
  });
  loadProfile();
}
function loadProfile(){
  const p=JSON.parse(localStorage.profile||"{}");
  $("profileView").innerHTML=`<h4>${p.name||""}</h4><p>${p.bio||""}</p>`;
}
loadProfile();

/* TIME TRACKER */
let timeData=JSON.parse(localStorage.timeData||"[]");

function addRow(data={start:"",end:""}){
  timeData.push(data);
  saveTime();
  renderTime();
}

function deleteRow(i){
  timeData.splice(i,1);
  saveTime();
  renderTime();
}

function saveTime(){
  localStorage.timeData=JSON.stringify(timeData);
}

function calcMinutes(s,e){
  if(!s||!e)return 0;
  let [sh,sm]=s.split(":").map(Number);
  let [eh,em]=e.split(":").map(Number);
  let start=sh*60+sm,end=eh*60+em;
  if(end<start)end+=1440;
  return end-start;
}

function format(m){
  return Math.floor(m/60)+"h "+(m%60)+"m";
}

function renderTime(){
  const table=$("sheet");
  table.innerHTML="<tr><th>Start</th><th>End</th><th>Duration</th><th></th></tr>";

  timeData.forEach((row,i)=>{
    let tr=document.createElement("tr");

    let s=document.createElement("input");
    s.type="time";
    s.value=row.start;

    let e=document.createElement("input");
    e.type="time";
    e.value=row.end;

    let d=document.createElement("span");

    function update(){
      timeData[i].start=s.value;
      timeData[i].end=e.value;

      let mins=calcMinutes(s.value,e.value);
      d.textContent=mins?format(mins):"-";

      /* SAFE ROLLOVER */
      if(e.value){
        let lastEnd=e.value;

        if(!timeData[i+1]){
          timeData.push({start:lastEnd,end:""});
        } else if(!timeData[i+1].start){
          timeData[i+1].start=lastEnd;
        }
      }

      totalCalc();
      saveTime();
    }

    s.onchange=e.onchange=update;

    d.textContent=calcMinutes(row.start,row.end)?format(calcMinutes(row.start,row.end)):"-";

    let del=document.createElement("button");
    del.textContent="✖";
    del.className="deleteBtn";
    del.onclick=()=>deleteRow(i);

    tr.insertCell().appendChild(s);
    tr.insertCell().appendChild(e);
    tr.insertCell().appendChild(d);
    tr.insertCell().appendChild(del);

    table.appendChild(tr);
  });

  totalCalc();
}

function totalCalc(){
  let total=0;
  timeData.forEach(r=>total+=calcMinutes(r.start,r.end));

  $("total").textContent="Total ✨ "+format(total);

  let hrs=(total/60).toFixed(1);
  $("daily").textContent="You worked "+hrs+" hrs today 💖";

  triggerConfetti(total);
}

/* CONFETTI (ONCE PER DAY) */
function triggerConfetti(total){
  let today=new Date().toDateString();

  if(total>=360 && localStorage.confettiDay!==today){
    launchConfetti();
    localStorage.confettiDay=today;
  }
}

function launchConfetti(){
  const wrap=$("confetti");
  wrap.innerHTML="";

  const symbols=["‧₊˚♪","𝄞","₊˚⊹","✧"];

  for(let i=0;i<40;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.textContent=symbols[Math.floor(Math.random()*symbols.length)];
    s.style.left=Math.random()*100+"vw";
    wrap.appendChild(s);
  }

  setTimeout(()=>wrap.innerHTML="",2000);
}

renderTime();
</script>

</body>
</html>
