<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MySpace Productivity ✨</title>

<style>
body{
  margin:0;
  font-family:"Comic Sans MS",cursive;
  background:black;
  color:#ff66cc;
  overflow-x:hidden;
}

/* GLITTER BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif");
  opacity:0.15;
  z-index:-1;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  font-size:26px;
  background:#000;
  border-bottom:3px solid hotpink;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:25% 50% 25%;
  gap:10px;
  padding:10px;
}

/* BOX */
.box{
  background:rgba(0,0,0,0.85);
  border:2px solid hotpink;
  border-radius:10px;
  padding:10px;
}

/* PROFILE */
.profile img{
  width:100%;
  border-radius:10px;
}

.counter{
  font-size:14px;
  color:#fff;
}

/* TABLE */
table{width:100%;border-collapse:collapse}
th,td{border:1px solid hotpink;padding:4px;text-align:center}

input,textarea,button,select{
  width:100%;
  margin-top:5px;
  padding:5px;
  border-radius:5px;
  border:none;
}

button{background:hotpink;color:white;cursor:pointer}

/* COMMENTS */
#comments{
  height:120px;
  overflow:auto;
  background:black;
  border:1px solid hotpink;
  padding:5px;
}

/* MUSIC PLAYER */
#musicPlayer{
  position:fixed;
  bottom:20px;
  left:20px;
  background:black;
  border:2px solid hotpink;
  padding:10px;
  cursor:move;
  z-index:999;
}

/* AIM POPUP */
#aim{
  position:fixed;
  bottom:20px;
  right:20px;
  background:black;
  border:2px solid hotpink;
  padding:10px;
  display:none;
}

/* CURSOR TRAIL */
.sparkle{
  position:fixed;
  width:8px;
  height:8px;
  background:hotpink;
  border-radius:50%;
  pointer-events:none;
  animation:fade 1s forwards;
}
@keyframes fade{
  to{opacity:0; transform:scale(2);}
}
</style>
</head>

<body>

<div class="header">
✨ MySpace Productivity ✨ — <b>ONLINE NOW</b>
</div>

<div class="container">

<!-- PROFILE -->
<div class="box profile">
  <h3>💖 Profile</h3>
  <img src="https://i.imgur.com/8Km9tLL.jpg">

  <p>✨ mood: productive but dramatic ✨</p>

  <div class="counter" id="views"></div>

  <h4>🎧 Playlist</h4>
  <select id="playlist"></select>
  <button onclick="toggleMusic()">Play / Pause</button>
</div>

<!-- PRODUCTIVITY -->
<div class="box">
  <h3>⏱ Time Tracker</h3>
  <table id="sheet">
    <tr><th>Start</th><th>End</th><th>Min</th></tr>
  </table>
  <button onclick="addRow()">+ Add</button>
  <div id="total"></div>
</div>

<!-- SIDE -->
<div>
  <div class="box">
    <h3>📝 Notes</h3>
    <textarea id="notes"></textarea>
  </div>

  <br>

  <div class="box">
    <h3>💬 Comment Wall</h3>
    <div id="comments"></div>
    <input id="commentInput">
    <button onclick="postComment()">Post</button>
  </div>
</div>

</div>

<!-- MUSIC -->
<div id="musicPlayer">
🎵 Now Playing<br>
<audio id="audio" loop></audio>
</div>

<!-- AIM -->
<div id="aim">
<b>Friend:</b> omg ur being productive??? 😭💀
</div>

<script>
const audio=document.getElementById("audio");

/* PLAYLIST */
const songs=[
  {name:"Y2K Vibes",src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
  {name:"Chill Coding",src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
  {name:"Late Night",src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"}
];

const playlist=document.getElementById("playlist");
songs.forEach((s,i)=>{
  const o=document.createElement("option");
  o.value=i;
  o.textContent=s.name;
  playlist.appendChild(o);
});

playlist.onchange=()=>{
  audio.src=songs[playlist.value].src;
  audio.play();
};

audio.src=songs[0].src;

function toggleMusic(){
  if(audio.paused) audio.play();
  else audio.pause();
}

/* VIEWS COUNTER */
let views=localStorage.views?parseInt(localStorage.views):0;
views++;
localStorage.views=views;
document.getElementById("views").textContent=`👀 Profile Views: ${views}`;

/* ROWS */
const sheet=document.getElementById("sheet");
function addRow(){
  const r=sheet.insertRow();
  const s=document.createElement("input");
  const e=document.createElement("input");
  const m=document.createElement("input");

  s.type="time"; e.type="time"; m.readOnly=true;

  r.insertCell(0).appendChild(s);
  r.insertCell(1).appendChild(e);
  r.insertCell(2).appendChild(m);

  function calc(){
    if(!s.value||!e.value) return;
    const [sh,sm]=s.value.split(":").map(Number);
    const [eh,em]=e.value.split(":").map(Number);
    m.value=Math.max(0,(eh*60+em)-(sh*60+sm));
    updateTotal();
  }

  s.onchange=e.onchange=calc;
}

function updateTotal(){
  let t=0;
  [...sheet.rows].slice(1).forEach(r=>{
    const v=r.cells[2].firstChild.value;
    if(v) t+=+v;
  });
  document.getElementById("total").textContent=`Total: ${t} min`;
}

/* NOTES SAVE */
const notes=document.getElementById("notes");
notes.value=localStorage.notes||"";
notes.oninput=()=>localStorage.notes=notes.value;

/* COMMENTS */
function postComment(){
  const c=document.getElementById("commentInput");
  if(!c.value.trim()) return;
  const d=document.createElement("div");
  d.textContent=c.value;
  document.getElementById("comments").appendChild(d);

  let saved=JSON.parse(localStorage.comments||"[]");
  saved.push(c.value);
  localStorage.comments=JSON.stringify(saved);

  c.value="";
}

/* LOAD COMMENTS */
(JSON.parse(localStorage.comments||"[]")).forEach(t=>{
  const d=document.createElement("div");
  d.textContent=t;
  document.getElementById("comments").appendChild(d);
});

/* CURSOR TRAIL */
document.addEventListener("mousemove",e=>{
  const s=document.createElement("div");
  s.className="sparkle";
  s.style.left=e.pageX+"px";
  s.style.top=e.pageY+"px";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),1000);
});

/* AIM POPUP RANDOM */
setInterval(()=>{
  const aim=document.getElementById("aim");
  aim.style.display="block";
  setTimeout(()=>aim.style.display="none",4000);
},15000);

/* DRAG PLAYER */
const player=document.getElementById("musicPlayer");
let down=false,offset=[0,0];
player.onmousedown=e=>{
  down=true;
  offset=[player.offsetLeft-e.clientX,player.offsetTop-e.clientY];
};
document.onmouseup=()=>down=false;
document.onmousemove=e=>{
  if(down){
    player.style.left=(e.clientX+offset[0])+"px";
    player.style.top=(e.clientY+offset[1])+"px";
  }
};
</script>

</body>
</html>
