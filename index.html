<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHAOS APP 💿</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
.header{
  padding:16px;
  font-size:20px;
  font-weight:600;
}

/* CARD */
.card{
  margin:12px;
  padding:16px;
  border-radius:20px;
  background:#1c1c1e;
}

/* BUTTON */
.mainBtn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:18px;
  background:#ff66cc;
  color:white;
  margin-top:10px;
}

/* TIMER */
#liveTimer{
  font-size:32px;
  text-align:center;
  margin:10px 0;
}

/* PROGRESS */
.barWrap{
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:#ff66cc;
}

/* TABLE */
table{width:100%;margin-top:10px;}
td{padding:6px;text-align:center;}

input{
  width:90%;
  padding:6px;
  border-radius:6px;
  border:none;
}

.deleteBtn{
  background:#ff4d6d;
  border:none;
  color:white;
  border-radius:6px;
}

/* CONFETTI */
.sparkle{
  position:fixed;
  top:0;
  font-size:18px;
  animation:fall 2s linear forwards;
}
@keyframes fall{
  to{transform:translateY(100vh);opacity:0;}
}
</style>
</head>

<body>

<div class="header">💿 Productivity</div>

<div class="card">
<div id="liveTimer">00:00</div>
<button class="mainBtn" onclick="toggleTimer()">Start Session</button>

<div class="barWrap">
  <div class="bar" id="progress"></div>
</div>

<div id="daily"></div>
</div>

<div class="card">
<table id="sheet"></table>
<button class="mainBtn" onclick="addRow()">+ Add Manual Session</button>
<div id="total"></div>
</div>

<div id="confetti"></div>

<script>
const $=id=>document.getElementById(id);

/* TIMER */
let running=false;
let startTime=null;
let interval=null;

function toggleTimer(){
  const btn=event.target;

  if(!running){
    startTime=Date.now();
    running=true;
    btn.textContent="Stop Session";
    interval=setInterval(updateTimer,1000);
  }else{
    running=false;
    clearInterval(interval);
    btn.textContent="Start Session";

    let mins=Math.floor((Date.now()-startTime)/60000);
    saveSession(mins);
  }
}

function updateTimer(){
  let diff=Math.floor((Date.now()-startTime)/1000);
  let m=Math.floor(diff/60);
  let s=diff%60;
  $("liveTimer").textContent=
    String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

/* DATA */
let timeData=JSON.parse(localStorage.timeData||"[]");

function saveSession(mins){
  let now=new Date();
  let end=now.toTimeString().slice(0,5);
  let start=new Date(now-mins*60000).toTimeString().slice(0,5);

  timeData.push({start,end});
  saveTime();
  renderTime();
}

function addRow(){
  timeData.push({start:"",end:""});
  saveTime();
  renderTime();
}

function deleteRow(i){
  timeData.splice(i,1);
  saveTime();
  renderTime();
}

function saveTime(){
  localStorage.timeData=JSON.stringify(timeData);
}

/* CALC */
function calcMinutes(s,e){
  if(!s||!e)return 0;
  let [sh,sm]=s.split(":").map(Number);
  let [eh,em]=e.split(":").map(Number);
  let start=sh*60+sm,end=eh*60+em;
  if(end<start)end+=1440;
  return end-start;
}

function format(m){
  return Math.floor(m/60)+"h "+(m%60)+"m";
}

/* RENDER */
function renderTime(){
  const table=$("sheet");
  table.innerHTML="<tr><th>Start</th><th>End</th><th>Min</th><th></th></tr>";

  timeData.forEach((row,i)=>{
    let tr=document.createElement("tr");

    let s=document.createElement("input");
    s.type="time";
    s.value=row.start;

    let e=document.createElement("input");
    e.type="time";
    e.value=row.end;

    let d=document.createElement("span");

    function update(){
      timeData[i].start=s.value;
      timeData[i].end=e.value;

      let mins=calcMinutes(s.value,e.value);
      d.textContent=mins||"-";

      /* AUTO ROLLOVER */
      if(e.value){
        if(!timeData[i+1]){
          timeData.push({start:e.value,end:""});
        } else if(!timeData[i+1].start){
          timeData[i+1].start=e.value;
        }
      }

      totalCalc();
      saveTime();
    }

    s.onchange=e.onchange=update;

    d.textContent=calcMinutes(row.start,row.end)||"-";

    let del=document.createElement("button");
    del.textContent="✖";
    del.className="deleteBtn";
    del.onclick=()=>deleteRow(i);

    tr.insertCell().appendChild(s);
    tr.insertCell().appendChild(e);
    tr.insertCell().appendChild(d);
    tr.insertCell().appendChild(del);

    table.appendChild(tr);
  });

  totalCalc();
}

function totalCalc(){
  let total=0;
  timeData.forEach(r=>total+=calcMinutes(r.start,r.end));

  $("total").textContent="Total: "+format(total);

  let hrs=(total/60).toFixed(1);
  $("daily").textContent="You worked "+hrs+" hrs today";

  let percent=Math.min((total/360)*100,100);
  $("progress").style.width=percent+"%";

  triggerConfetti(total);
}

/* CONFETTI */
function triggerConfetti(total){
  let today=new Date().toDateString();
  if(total>=360 && localStorage.confettiDay!==today){
    launchConfetti();
    localStorage.confettiDay=today;
  }
}

function launchConfetti(){
  const wrap=$("confetti");
  wrap.innerHTML="";
  const symbols=["‧₊˚♪","𝄞","₊˚⊹","✧"];

  for(let i=0;i<40;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.textContent=symbols[Math.floor(Math.random()*symbols.length)];
    s.style.left=Math.random()*100+"vw";
    wrap.appendChild(s);
  }

  setTimeout(()=>wrap.innerHTML="",2000);
}

renderTime();
</script>

</body>
</html>
