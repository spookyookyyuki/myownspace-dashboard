<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>CHAOS APP 💿</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<style>
:root{
  --accent:hotpink;
  --bg1:#ff00cc;
  --bg2:#3333ff;
  --bg3:#00ffee;
  --box:rgba(0,0,0,0.75);
  --text:white;
}

/* BODY */
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  color:var(--text);
  background:linear-gradient(270deg,var(--bg1),var(--bg2),var(--bg3));
  background-size:600% 600%;
  animation:bgMove 10s infinite alternate;
  padding-bottom:env(safe-area-inset-bottom);
}

@keyframes bgMove{
  0%{background-position:0%}
  100%{background-position:100%}
}

/* THEMES */
body.emo{--bg1:#000;--bg2:#111;--bg3:#222;--accent:red;}
body.scene{--bg1:#ff00cc;--bg2:#00ff99;--bg3:#ffff00;--accent:lime;}
body.glitch{--bg1:#000;--bg2:#0ff;--bg3:#f0f;--accent:#0ff;text-shadow:1px 0 red,-1px 0 blue;}
body.glitter{--bg1:#ff9cfb;--bg2:#ffd6f9;--bg3:#fff;--accent:#ff66cc;}

/* APP */
#app{height:100vh;overflow:hidden;position:relative;}
.page{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:100%;
  overflow-y:auto;
  transition:.35s;
  padding-bottom:90px;
}
.page.active{left:0;}
.page.left{left:-100%;}

/* BOX */
.box{
  background:var(--box);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.2);
  margin:12px;
  padding:12px;
  border-radius:16px;
}

/* NAV (GLASS) */
#nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  backdrop-filter:blur(20px);
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid rgba(255,255,255,0.2);
}

#nav button{
  background:none;
  border:none;
  color:white;
  font-size:20px;
  transition:.2s;
}

#nav button:active{
  transform:scale(0.85);
  opacity:.6;
}

#nav button.active{
  color:var(--accent);
  transform:scale(1.2);
}

/* SETTINGS DRAWER */
#settingsPanel{
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:70%;
  background:rgba(0,0,0,0.9);
  backdrop-filter:blur(20px);
  border-top-left-radius:20px;
  border-top-right-radius:20px;
  padding:15px;
  transition:.4s;
  z-index:999;
}

#settingsPanel.open{
  bottom:0;
}

/* COLLAGE */
#collage{position:relative;min-height:200px;}
#collage img{
  position:absolute;
  width:80px;
  border-radius:8px;
}

/* PROFILE PIC */
#pfp{
  width:100px;
  height:100px;
  border-radius:12px;
  object-fit:cover;
}

/* INPUTS */
input,textarea,select,button{
  width:100%;
  margin-top:6px;
  font-size:16px;
  border-radius:8px;
  padding:6px;
}

/* MUSIC */
#music{
  position:fixed;
  top:env(safe-area-inset-top);
  left:10px;
  width:120px;
}
</style>
</head>

<body>

<div id="app">

<div class="page active">
<div class="box">
<h3>💖 Profile</h3>
<img id="pfp">
<input id="name" placeholder="Name">
<textarea id="bio"></textarea>
<button onclick="saveProfile()">Save</button>
<div id="profileView"></div>
</div>
</div>

<div class="page">
<div class="box">
<h3>⏱ Time</h3>
<table id="sheet">
<tr><th>Start</th><th>End</th><th>Min</th></tr>
</table>
<button onclick="addRow()">+ Add</button>
<div id="total"></div>
</div>
</div>

<div class="page">
<div class="box">
<h3>💬 Comments</h3>
<div id="comments"></div>
<input id="commentInput">
<button onclick="postComment()">Post</button>
</div>

<div class="box">
<h3>📖 Guestbook</h3>
<div id="guestbook"></div>
<input id="guestInput">
<button onclick="addGuest()">Sign</button>
</div>
</div>

<div class="page">
<div class="box">
<h3>📸 Collage</h3>
<input type="file" id="collageUpload" multiple>
<div id="collage"></div>
</div>
</div>

</div>

<!-- NAV -->
<div id="nav">
<button onclick="goPage(0)">🏠</button>
<button onclick="goPage(1)">⏱</button>
<button onclick="goPage(2)">💬</button>
<button onclick="goPage(3)">📸</button>
<button onclick="toggleSettings()">⚙️</button>
</div>

<!-- SETTINGS DRAWER -->
<div id="settingsPanel">
<h3>Settings</h3>

<label>Theme</label>
<select id="theme">
<option value="">Default</option>
<option value="emo">Emo</option>
<option value="scene">Scene</option>
<option value="glitch">Glitch</option>
<option value="glitter">Glitter</option>
</select>

<label>Background</label>
<input type="checkbox" id="bgToggle">
<input type="file" id="bgUpload">

<label>Profile Pic</label>
<input type="file" id="pfpUpload">

</div>

<!-- MUSIC -->
<div id="music">
<audio controls loop id="audio">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>
</div>

<script>
const $=id=>document.getElementById(id);

/* NAV */
const pages=[...document.querySelectorAll(".page")];
const navBtns=[...document.querySelectorAll("#nav button")];
let current=0;

function goPage(i){
  pages.forEach((p,index)=>{
    p.classList.remove("active","left");
    if(index===i)p.classList.add("active");
    else if(index<i)p.classList.add("left");
  });

  navBtns.forEach((b,idx)=>{
    if(idx<4)b.classList.toggle("active",idx===i);
  });

  current=i;
}

/* SWIPE */
let startX=0;
document.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
document.addEventListener("touchend",e=>{
  let diff=startX-e.changedTouches[0].clientX;
  if(Math.abs(diff)<50)return;
  if(diff>0&&current<3)goPage(current+1);
  if(diff<0&&current>0)goPage(current-1);
});

/* SETTINGS DRAWER */
function toggleSettings(){
  $("settingsPanel").classList.toggle("open");
}

/* THEME */
$("theme").onchange=e=>{
  document.body.className=e.target.value;
  localStorage.theme=e.target.value;
};
document.body.className=localStorage.theme||"";

/* BASE64 */
function toBase64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}

/* PROFILE PIC */
$("pfpUpload").onchange=async e=>{
  const d=await toBase64(e.target.files[0]);
  localStorage.pfp=d;
  $("pfp").src=d;
};
if(localStorage.pfp) $("pfp").src=localStorage.pfp;

/* PROFILE */
function saveProfile(){
  localStorage.profile=JSON.stringify({
    name:$("name").value,
    bio:$("bio").value
  });
  loadProfile();
}
function loadProfile(){
  const p=JSON.parse(localStorage.profile||"{}");
  $("profileView").innerHTML=`<h4>${p.name||""}</h4><p>${p.bio||""}</p>`;
}
loadProfile();

/* COMMENTS */
function postComment(){
  let v=$("commentInput").value;
  if(!v)return;
  let s=JSON.parse(localStorage.comments||"[]");
  s.push(v);
  localStorage.comments=JSON.stringify(s);
  $("commentInput").value="";
  loadComments();
}
function loadComments(){
  $("comments").innerHTML="";
  JSON.parse(localStorage.comments||"[]").forEach(t=>{
    let d=document.createElement("div");
    d.textContent=t;
    $("comments").appendChild(d);
  });
}
loadComments();

/* GUESTBOOK */
function addGuest(){
  let v=$("guestInput").value;
  if(!v)return;
  let s=JSON.parse(localStorage.guestbook||"[]");
  s.push({text:v,time:new Date().toLocaleString()});
  localStorage.guestbook=JSON.stringify(s);
  $("guestInput").value="";
  loadGuest();
}
function loadGuest(){
  $("guestbook").innerHTML="";
  JSON.parse(localStorage.guestbook||"[]").forEach(e=>{
    let d=document.createElement("div");
    d.innerHTML=`<b>${e.time}</b><br>${e.text}`;
    $("guestbook").appendChild(d);
  });
}
loadGuest();

/* COLLAGE */
$("collageUpload").onchange=async e=>{
  let s=JSON.parse(localStorage.collage||"[]");
  for(const f of e.target.files){
    s.push(await toBase64(f));
  }
  localStorage.collage=JSON.stringify(s);
  loadCollage();
};

function loadCollage(){
  const wrap=$("collage");
  wrap.innerHTML="";
  const s=JSON.parse(localStorage.collage||"[]");

  s.forEach((src,i)=>{
    const img=document.createElement("img");
    img.src=src;
    img.style.left=Math.random()*200+"px";
    img.style.top=Math.random()*200+"px";

    let down=false,ox,oy;
    img.onmousedown=e=>{down=true;ox=e.offsetX;oy=e.offsetY};
    document.onmouseup=()=>down=false;
    document.onmousemove=e=>{
      if(!down)return;
      img.style.left=(e.pageX-ox)+"px";
      img.style.top=(e.pageY-oy)+"px";
    };

    img.ondblclick=()=>{
      s.splice(i,1);
      localStorage.collage=JSON.stringify(s);
      loadCollage();
    };

    wrap.appendChild(img);
  });
}
loadCollage();

/* TIME */
function addRow(){
  const r=$("sheet").insertRow();
  const s=document.createElement("input");
  const e=document.createElement("input");
  const m=document.createElement("input");
  s.type=e.type="time"; m.readOnly=true;

  r.insertCell(0).appendChild(s);
  r.insertCell(1).appendChild(e);
  r.insertCell(2).appendChild(m);

  function calc(){
    if(!s.value||!e.value)return;
    let [sh,sm]=s.value.split(":").map(Number);
    let [eh,em]=e.value.split(":").map(Number);
    let start=sh*60+sm,end=eh*60+em;
    if(end<start)end+=1440;
    m.value=end-start;
    updateTotal();
  }

  s.onchange=e.onchange=calc;
}

function updateTotal(){
  let t=0;
  [...$("sheet").rows].slice(1).forEach(r=>{
    let v=r.cells[2].firstChild.value;
    if(v)t+=+v;
  });
  $("total").textContent="Total: "+t+" min";
}

/* MUSIC */
window.onload=()=>{$("audio").volume=0.3;$("audio").play().catch(()=>{});};
</script>

</body>
</html>
