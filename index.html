<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHAOS APP 💿</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0f0f0f;
  color:white;
}
.header{padding:16px;font-size:20px;font-weight:600;}
.card{margin:12px;padding:16px;border-radius:20px;background:#1c1c1e;}
.mainBtn{
  width:100%;padding:16px;border:none;border-radius:14px;
  font-size:18px;background:#ff66cc;color:white;margin-top:10px;
}
#liveTimer{font-size:32px;text-align:center;margin:10px 0;}
.barWrap{height:10px;background:#333;border-radius:10px;overflow:hidden;}
.bar{height:100%;width:0%;background:#ff66cc;}
table{width:100%;margin-top:10px;}
td{padding:6px;text-align:center;}
input{width:90%;padding:6px;border-radius:6px;border:none;}
.deleteBtn{background:#ff4d6d;border:none;color:white;border-radius:6px;}
.sparkle{
  position:fixed;top:0;font-size:18px;
  animation:fall 2s linear forwards;
}
@keyframes fall{to{transform:translateY(100vh);opacity:0;}}
</style>
</head>

<body>

<div class="header">💿 Productivity</div>

<div class="card">
  <div id="liveTimer">00:00</div>
  <button class="mainBtn" onclick="toggleTimer(this)">Start Session</button>

  <div class="barWrap">
    <div class="bar" id="progress"></div>
  </div>

  <div id="daily"></div>
</div>

<div class="card">
  <table id="sheet"></table>
  <button class="mainBtn" onclick="addRow()">+ Add Manual Session</button>
  <div id="total"></div>
</div>

<div id="confetti"></div>

<script>
const $ = id => document.getElementById(id);

/* STATE */
let running=false;
let startTime=null;
let interval=null;

/* SAFE LOAD */
let timeData;
try{
  timeData=JSON.parse(localStorage.timeData||"[]");
  if(!Array.isArray(timeData)) timeData=[];
}catch{
  timeData=[];
}

/* TIMER */
function toggleTimer(btn){
  if(!running){
    startTime=Date.now();
    running=true;
    btn.textContent="Stop Session";
    interval=setInterval(updateTimer,1000);
  }else{
    running=false;
    clearInterval(interval);
    btn.textContent="Start Session";

    const mins=Math.floor((Date.now()-startTime)/60000);
    $("liveTimer").textContent="00:00";

    if(mins>0) saveSession(mins);
  }
}

function updateTimer(){
  const diff=Math.floor((Date.now()-startTime)/1000);
  const m=Math.floor(diff/60);
  const s=diff%60;

  $("liveTimer").textContent=
    String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

/* DATA */
function saveSession(mins){
  const now=new Date();
  const end=now.toTimeString().slice(0,5);
  const start=new Date(now-mins*60000).toTimeString().slice(0,5);

  timeData.push({start,end});
  normalizeData();
  saveTime();
  renderTime();
}

function addRow(){
  timeData.push({start:"",end:""});
  saveTime();
  renderTime();
}

function deleteRow(i){
  timeData.splice(i,1);
  saveTime();
  renderTime();
}

function saveTime(){
  localStorage.timeData=JSON.stringify(timeData);
}

/* TIME UTILS */
function toMinutes(t){
  if(!t) return null;
  const [h,m]=t.split(":").map(Number);
  return h*60+m;
}

function toTime(mins){
  mins=mins%1440;
  const h=Math.floor(mins/60);
  const m=mins%60;
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
}

function calcMinutes(s,e){
  if(!s||!e) return 0;
  let start=toMinutes(s);
  let end=toMinutes(e);
  if(end<start) end+=1440;
  return end-start;
}

function format(m){
  return Math.floor(m/60)+"h "+(m%60)+"m";
}

/* AUTO MERGE */
function normalizeData(){
  const valid=timeData
    .filter(r=>r.start&&r.end)
    .map(r=>({start:toMinutes(r.start),end:toMinutes(r.end)}))
    .sort((a,b)=>a.start-b.start);

  const merged=[];

  for(const cur of valid){
    if(!merged.length) merged.push(cur);
    else{
      const last=merged[merged.length-1];
      if(cur.start<=last.end){
        last.end=Math.max(last.end,cur.end);
      }else{
        merged.push(cur);
      }
    }
  }

  timeData=[
    ...merged.map(r=>({start:toTime(r.start),end:toTime(r.end)})),
    ...timeData.filter(r=>!r.start||!r.end)
  ];
}

/* RENDER */
function renderTime(){
  const table=$("sheet");

  table.innerHTML=`
    <tr>
      <th>Start</th>
      <th>End</th>
      <th>Min</th>
      <th></th>
    </tr>
  `;

  const frag=document.createDocumentFragment();

  timeData.forEach((row,i)=>{
    const tr=document.createElement("tr");

    const s=document.createElement("input");
    s.type="time";
    s.value=row.start;

    const e=document.createElement("input");
    e.type="time";
    e.value=row.end;

    const d=document.createElement("span");
    d.textContent=calcMinutes(row.start,row.end)||"-";

    const update=()=>{
      const current=timeData[i];
      current.start=s.value;
      current.end=e.value;

      let changed=false;

      if(e.value){
        const next=timeData[i+1];
        if(!next){
          timeData.push({start:e.value,end:""});
          changed=true;
        }else if(!next.start){
          next.start=e.value;
          changed=true;
        }
      }

      normalizeData();
      saveTime();
      totalCalc();

      if(changed) renderTime();
    };

    s.addEventListener("change",update);
    e.addEventListener("change",update);

    const del=document.createElement("button");
    del.textContent="✖";
    del.className="deleteBtn";
    del.onclick=()=>deleteRow(i);

    tr.insertCell().appendChild(s);
    tr.insertCell().appendChild(e);
    tr.insertCell().appendChild(d);
    tr.insertCell().appendChild(del);

    frag.appendChild(tr);
  });

  table.appendChild(frag);
  totalCalc();
}

/* TOTAL */
function totalCalc(){
  let total=0;
  for(const r of timeData){
    total+=calcMinutes(r.start,r.end);
  }

  $("total").textContent="Total: "+format(total);

  const hrs=(total/60).toFixed(1);
  $("daily").textContent="You worked "+hrs+" hrs today";

  const percent=Math.min((total/360)*100,100);
  $("progress").style.width=percent+"%";

  triggerConfetti(total);
}

/* CONFETTI */
function triggerConfetti(total){
  const today=new Date().toDateString();
  if(total>=360 && localStorage.confettiDay!==today){
    launchConfetti();
    localStorage.confettiDay=today;
  }
}

function launchConfetti(){
  const wrap=$("confetti");
  wrap.innerHTML="";
  const symbols=["‧₊˚♪","𝄞","₊˚⊹","✧"];

  for(let i=0;i<40;i++){
    const s=document.createElement("div");
    s.className="sparkle";
    s.textContent=symbols[Math.floor(Math.random()*symbols.length)];
    s.style.left=Math.random()*100+"vw";
    wrap.appendChild(s);
  }

  setTimeout(()=>wrap.innerHTML="",2000);
}

/* INIT */
renderTime();
</script>

</body>
</html>
