<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHAOS APP 💿</title>

<style>
:root{
  --accent:#ff66cc;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
.header{
  padding:16px;
  font-size:20px;
  font-weight:600;
}

/* CARD */
.card{
  margin:12px;
  padding:16px;
  border-radius:20px;
  background:#1c1c1e;
}

/* BUTTON */
.mainBtn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:18px;
  background:var(--accent);
  color:white;
}

/* TIMER */
#liveTimer{
  font-size:32px;
  text-align:center;
  margin:10px 0;
}

/* PROGRESS BAR */
.barWrap{
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.bar{
  height:100%;
  width:0%;
  background:var(--accent);
}

/* TABLE */
table{width:100%;margin-top:10px;}
td{padding:6px;text-align:center;}

input{
  width:100%;
  padding:8px;
  border-radius:8px;
  border:none;
}

/* CONFETTI */
.sparkle{
  position:fixed;
  top:0;
  font-size:18px;
  animation:fall 2s linear forwards;
}
@keyframes fall{
  to{transform:translateY(100vh);opacity:0;}
}
</style>
</head>

<body>

<div class="header">💿 Productivity</div>

<div class="card">

<div id="liveTimer">00:00</div>

<button class="mainBtn" onclick="toggleTimer()">Start Session</button>

<div class="barWrap">
  <div class="bar" id="progress"></div>
</div>

<div id="daily"></div>

</div>

<div class="card">

<table id="sheet"></table>

<button class="mainBtn" onclick="addRow()">+ Add Session</button>

<div id="total"></div>

</div>

<div id="confetti"></div>

<script>
const $=id=>document.getElementById(id);

/* TIMER */
let running=false;
let startTime=null;
let interval=null;

function toggleTimer(){
  if(!running){
    startTime=Date.now();
    running=true;
    event.target.textContent="Stop Session";
    interval=setInterval(updateTimer,1000);
  }else{
    running=false;
    clearInterval(interval);
    event.target.textContent="Start Session";

    let mins=Math.floor((Date.now()-startTime)/60000);
    saveSession(mins);
  }
}

function updateTimer(){
  let diff=Math.floor((Date.now()-startTime)/1000);
  let m=Math.floor(diff/60);
  let s=diff%60;
  $("liveTimer").textContent=
    String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

/* SAVE SESSION */
let timeData=JSON.parse(localStorage.timeData||"[]");

function saveSession(mins){
  let now=new Date();
  let end=now.toTimeString().slice(0,5);

  let start=new Date(now-mins*60000)
    .toTimeString().slice(0,5);

  timeData.push({start,end});
  saveTime();
  renderTime();
}

function addRow(){
  timeData.push({start:"",end:""});
  saveTime();
  renderTime();
}

function saveTime(){
  localStorage.timeData=JSON.stringify(timeData);
}

/* CALC */
function calcMinutes(s,e){
  if(!s||!e)return 0;
  let [sh,sm]=s.split(":").map(Number);
  let [eh,em]=e.split(":").map(Number);
  let start=sh*60+sm,end=eh*60+em;
  if(end<start)end+=1440;
  return end-start;
}

function format(m){
  return Math.floor(m/60)+"h "+(m%60)+"m";
}

/* RENDER */
function renderTime(){
  const table=$("sheet");
  table.innerHTML="<tr><th>Start</th><th>End</th><th>Min</th></tr>";

  timeData.forEach(r=>{
    let tr=document.createElement("tr");

    let mins=calcMinutes(r.start,r.end);

    tr.innerHTML=`
      <td>${r.start||"-"}</td>
      <td>${r.end||"-"}</td>
      <td>${mins||"-"}</td>
    `;

    table.appendChild(tr);
  });

  totalCalc();
}

function totalCalc(){
  let total=0;
  timeData.forEach(r=>total+=calcMinutes(r.start,r.end));

  $("total").textContent="Total: "+format(total);

  let hrs=(total/60).toFixed(1);
  $("daily").textContent="You worked "+hrs+" hrs today";

  /* PROGRESS BAR */
  let percent=Math.min((total/360)*100,100);
  $("progress").style.width=percent+"%";

  triggerConfetti(total);
}

/* CONFETTI */
function triggerConfetti(total){
  let today=new Date().toDateString();

  if(total>=360 && localStorage.confettiDay!==today){
    launchConfetti();
    localStorage.confettiDay=today;
  }
}

function launchConfetti(){
  const wrap=$("confetti");
  wrap.innerHTML="";

  const symbols=["‧₊˚♪","𝄞","₊˚⊹","✧"];

  for(let i=0;i<40;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.textContent=symbols[Math.floor(Math.random()*symbols.length)];
    s.style.left=Math.random()*100+"vw";
    wrap.appendChild(s);
  }

  setTimeout(()=>wrap.innerHTML="",2000);
}

renderTime();
</script>

</body>
</html>
