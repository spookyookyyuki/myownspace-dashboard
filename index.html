<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MySpace Productivity</title>

<style>
body{
  margin:0;
  font-family:"Comic Sans MS",cursive;
  background:#111;
  color:#ff66cc;
}

/* THEMES */
body.scene{color:#ff00aa}
body.kawaii{color:#ff1493}
body.pastel{color:#9966ff}
body.gothic{color:#ff66cc}
body.emo{color:red;font-family:"Courier New"}
body.neon{color:#39ff14;text-shadow:0 0 6px #39ff14}
body.y2k{color:white}

/* HEADER */
.header{
  background:#ff0099;
  padding:12px;
  text-align:center;
  font-size:22px;
  color:white;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:250px 1fr 250px;
  gap:15px;
  padding:15px;
}
@media(max-width:900px){
  .container{grid-template-columns:1fr;}
}

/* BOX */
.box{
  background:rgba(20,20,20,0.85);
  border:3px solid hotpink;
  padding:12px;
  border-radius:10px;
}

/* INPUTS */
input,select,textarea,button{
  width:100%;
  margin-top:5px;
  padding:8px;
  border-radius:6px;
  font-size:16px;
}
input,textarea,select{
  background:black;
  color:#ff66cc;
  border:1px solid hotpink;
}
button{
  background:#ff0099;
  color:white;
  border:none;
  cursor:pointer;
}
button:hover{opacity:0.85}

/* TABLE */
table{width:100%;border-collapse:collapse}
th,td{border:1px solid hotpink;padding:6px;text-align:center}

/* GRAPH */
#graph{height:18px;background:#333;margin-top:6px}
#bar{height:100%;width:0%;background:hotpink}

/* COMMENTS */
#comments{
  height:120px;
  overflow:auto;
  background:black;
  padding:6px;
  border:1px solid hotpink;
}

/* SETTINGS */
#settingsBtn{
  position:fixed;
  top:10px;
  right:10px;
  z-index:999;
  padding:10px;
}

#settingsPanel{
  position:fixed;
  top:0;
  right:-260px;
  width:260px;
  height:100%;
  background:#111;
  border-left:3px solid hotpink;
  padding:15px;
  transition:0.3s;
  z-index:998;
}
#settingsPanel.open{right:0}

/* BACKGROUND */
#customBG{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-2;
  background-size:cover;
  background-position:center;
}

#bgOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  z-index:-1;
  backdrop-filter:blur(0px);
}

/* POPUP */
#goalPopup{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#ff0099;
  padding:20px;
  display:none;
  color:white;
}
</style>
</head>

<body class="scene">

<!-- SETTINGS -->
<button id="settingsBtn">⚙️</button>

<div id="settingsPanel">
  <h3>Customize</h3>

  <label>Background</label>
  <input type="file" id="bgUpload">

  <label>Size</label>
  <select id="bgSize">
    <option value="cover">Cover</option>
    <option value="contain">Contain</option>
    <option value="auto">Auto</option>
  </select>

  <label>Dark</label>
  <input type="range" id="bgDark" min="0" max="0.8" step="0.05">

  <label>Blur</label>
  <input type="range" id="bgBlur" min="0" max="10">

  <button onclick="resetBG()">Reset</button>
</div>

<div class="header">MySpace Productivity ✨</div>

<div class="container">

<!-- LEFT -->
<div class="box">
<h4>Theme</h4>
<select id="themeSelect">
<option value="scene">Scene</option>
<option value="kawaii">Kawaii</option>
<option value="pastel">Pastel</option>
<option value="gothic">Gothic</option>
<option value="emo">Emo</option>
<option value="neon">Neon</option>
<option value="y2k">Y2K</option>
</select>
</div>

<!-- CENTER -->
<div class="box">
<h3>Production Time</h3>
<table id="sheet">
<tr><th>Start</th><th>End</th><th>Minutes</th></tr>
</table>

<button onclick="addRow()">+ Add Row</button>
<button onclick="clearRows()">Clear</button>

<div id="timeDisplay"></div>
<div id="graph"><div id="bar"></div></div>
</div>

<!-- RIGHT -->
<div>
<div class="box">
<h3>Notes</h3>
<textarea id="notes"></textarea>
</div>

<br>

<div class="box">
<h3>Comment Wall</h3>
<div id="comments"></div>
<input id="commentInput">
<button onclick="postComment()">Post</button>
</div>
</div>

</div>

<div id="goalPopup">✨ Goal Reached! ✨</div>

<script>
const sheet = document.getElementById("sheet")

/* SETTINGS PANEL */
settingsBtn.onclick = () => settingsPanel.classList.toggle("open")

/* BACKGROUND ELEMENTS */
const bg = document.createElement("div")
bg.id="customBG"
document.body.appendChild(bg)

const overlay = document.createElement("div")
overlay.id="bgOverlay"
document.body.appendChild(overlay)

/* LOAD BG */
if(localStorage.bgImage) bg.style.backgroundImage=`url(${localStorage.bgImage})`
if(localStorage.bgSize) bg.style.backgroundSize=localStorage.bgSize
if(localStorage.bgDark) overlay.style.opacity=localStorage.bgDark
if(localStorage.bgBlur) overlay.style.backdropFilter=`blur(${localStorage.bgBlur}px)`

bgUpload.onchange=e=>{
  let r=new FileReader()
  r.onload=()=>{
    bg.style.backgroundImage=`url(${r.result})`
    localStorage.bgImage=r.result
  }
  r.readAsDataURL(e.target.files[0])
}

bgSize.onchange=()=>{bg.style.backgroundSize=bgSize.value;localStorage.bgSize=bgSize.value}
bgDark.oninput=()=>{overlay.style.opacity=bgDark.value;localStorage.bgDark=bgDark.value}
bgBlur.oninput=()=>{overlay.style.backdropFilter=`blur(${bgBlur.value}px)`;localStorage.bgBlur=bgBlur.value}

function resetBG(){
  localStorage.removeItem("bgImage")
  localStorage.removeItem("bgSize")
  localStorage.removeItem("bgDark")
  localStorage.removeItem("bgBlur")
  location.reload()
}

/* THEME */
themeSelect.value=localStorage.theme||"scene"
document.body.className=themeSelect.value
themeSelect.onchange=()=>{
  document.body.className=themeSelect.value
  localStorage.theme=themeSelect.value
}

/* NOTES */
notes.value=localStorage.notes||""
notes.oninput=()=>localStorage.notes=notes.value

/* ROWS */
function addRow(data={}){
  let row=sheet.insertRow()
  let start=document.createElement("input")
  let end=document.createElement("input")
  let mins=document.createElement("input")

  start.type="time"
  end.type="time"
  mins.type="number"

  start.value=data.start||""
  end.value=data.end||""
  mins.value=data.mins||""

  row.insertCell(0).appendChild(start)
  row.insertCell(1).appendChild(end)
  row.insertCell(2).appendChild(mins)

  function calc(){
    if(!start.value||!end.value)return
    let s=new Date("1970-01-01T"+start.value)
    let e=new Date("1970-01-01T"+end.value)
    let diff=(e-s)/60000
    if(diff>=0) mins.value=diff
    saveRows()
    updateTotal()
  }

  start.onchange=end.onchange=calc
  mins.oninput=()=>{saveRows();updateTotal()}
}

/* SAVE/LOAD */
function saveRows(){
  let data=[]
  document.querySelectorAll("#sheet tr").forEach((r,i)=>{
    if(i===0)return
    let inputs=r.querySelectorAll("input")
    data.push({start:inputs[0].value,end:inputs[1].value,mins:inputs[2].value})
  })
  localStorage.rows=JSON.stringify(data)
}

function loadRows(){
  let data=JSON.parse(localStorage.rows||"[]")
  if(data.length===0){for(let i=0;i<5;i++)addRow()}
  else data.forEach(d=>addRow(d))
  updateTotal()
}

function clearRows(){
  localStorage.removeItem("rows")
  location.reload()
}

/* TOTAL */
function updateTotal(){
  let total=0
  document.querySelectorAll("#sheet tr").forEach((r,i)=>{
    if(i===0)return
    let v=r.cells[2].firstChild.value
    if(v) total+=Number(v)
  })

  let h=Math.floor(total/60),m=total%60
  timeDisplay.innerText=total?`${total} min (${h}h ${m}m)`:""
  bar.style.width=Math.min((total/480)*100,100)+"%"

  if(total>=480){
    goalPopup.style.display="block"
    setTimeout(()=>goalPopup.style.display="none",3000)
  }
}

/* COMMENTS */
function postComment(){
  if(!commentInput.value.trim())return
  let d=document.createElement("div")
  d.textContent=commentInput.value
  comments.appendChild(d)

  let saved=JSON.parse(localStorage.comments||"[]")
  saved.push(commentInput.value)
  localStorage.comments=JSON.stringify(saved)

  commentInput.value=""
}

function loadComments(){
  let saved=JSON.parse(localStorage.comments||"[]")
  saved.forEach(c=>{
    let d=document.createElement("div")
    d.textContent=c
    comments.appendChild(d)
  })
}

loadRows()
loadComments()
</script>

</body>
</html>
